services:
  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    command: redis-server --requirepass securepass123
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - gateway-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "securepass123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build: .
    container_name: gateway-app
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      # Override the localhost:6379 in config.yaml so the gateway
      # reaches Redis by its Docker network hostname instead.
      - REDIS_ADDR=redis:6379
      # Set ADMIN_KEY to protect /admin/block-ip in production.
      # Example: - ADMIN_KEY=your-secret-key-here
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - gateway-net
    restart: unless-stopped

networks:
  gateway-net:
    driver: bridge

volumes:
  redis_data:
